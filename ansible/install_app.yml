---
- hosts: server
  become: yes

  tasks:

  - name: install docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: start docker
    service:
      name: docker
      state: started

  - name: pull application
    docker_container:
      name: fastapi-app
      image: yourdockerhub/fastapi-app:latest
      state: started
      ports:
        - "8000:8000"
